apiVersion: v1
kind: Pod
metadata:
  name: pod-anti-affinity-1
  labels:
   tier: database
spec:
 containers:
 - name: nginx
    image: nginx
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-anti-affinity-2
  labels:
   tier: backend
spec:
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: tier
            operator: In
            values:
            - database
        topologyKey: topology.kubernetes.io/zone
  containers:
  - name: nginx
    image: nginx
